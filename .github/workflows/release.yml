name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # create GitHub release
  id-token: write          # npm provenance (OIDC)

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Build (tsc -> dist/)
        run: npm run build

      - name: Pack & inspect tarball
        run: |
          npm pack
          echo "=== tarball contents (top-level) ==="
          tar tzf nanoagent-*.tgz | sed 's#^package/##' | awk -F/ '{print $1}' | sort | uniq -c

      - name: Publish to npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" =~ -[0-9A-Za-z.-]+$ ]]; then
            TAG="next"          # prerelease -> next tag
          else
            TAG="latest"        # stable release
          fi
          echo "Publishing nanoagent@$VERSION with dist-tag '$TAG'"
          npm publish --provenance --access public --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: nanoagent ${{ github.ref_name }}
          generate_release_notes: true
          files: nanoagent-*.tgz
