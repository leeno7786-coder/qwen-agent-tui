name: Documentation

on:
  push:
    branches: [main, development]
    paths:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, development]
    paths:
      - '**.md'
      - 'docs/**'

jobs:
  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.markdownlinkcheck.json'
          
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Spell check
        uses: rojopolis/spellcheck-github-actions@0.22.0
        with:
          config_path: .spellcheck.json
          task_name: markdown

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v12
        with:
          globs: '**/*.md'
